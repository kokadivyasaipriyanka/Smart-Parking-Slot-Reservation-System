name: CI-CD Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          python -c "import app; print('app import ok')"
          python -c "from routes.reservation_routes import reservation_bp; print('routes import ok')"
          python -c "from models.reservation_model import ReservationModel; print('models import ok')"

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy project to EC2
        run: |
          rsync -avz --delete \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'dist' \
            --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.APP_DIR }}

      - name: Write production .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cat > ${{ secrets.APP_DIR }}/.env << 'EOT'
          ${{ secrets.PROD_ENV_FILE }}
          EOT
          EOF

      - name: Install dependencies and restart app on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ${{ secrets.APP_DIR }}

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt

            sudo systemctl restart parking
            sudo systemctl status parking --no-pager
          EOF